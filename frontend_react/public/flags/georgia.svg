<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40">
  <rect width="60" height="40" fill="#fff"/>
  <!-- Центральный крест -->
  <rect x="26" width="8" height="40" fill="#ff0000"/>
  <rect y="16" width="60" height="8" fill="#ff0000"/>
  <!-- Левый верхний крест -->
  <rect x="8" y="5" width="2" height="8" fill="#ff0000"/>
  <rect x="5" y="7" width="8" height="2" fill="#ff0000"/>
  <!-- Правый верхний крест -->
  <rect x="47" y="5" width="2" height="8" fill="#ff0000"/>
  <rect x="44" y="7" width="8" height="2" fill="#ff0000"/>
  <!-- Левый нижний крест -->
  <rect x="8" y="27" width="2" height="8" fill="#ff0000"/>
  <rect x="5" y="29" width="8" height="2" fill="#ff0000"/>
  <!-- Правый нижний крест -->
  <rect x="47" y="27" width="2" height="8" fill="#ff0000"/>
  <rect x="44" y="29" width="8" height="2" fill="#ff0000"/>
</svg>
